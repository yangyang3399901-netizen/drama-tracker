<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Link to our Mobile App blueprint -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    
    <link class="rounded-full" rel="icon" type="image/jpeg" href="https://images.unsplash.com/photo-1593305841991-05c297ba4575?w=256&h=256&fit=crop">

    <!-- Tailwind CSS for sleek styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .theme-night { --bg: #111827; --card: #1f2937; --text: #f9fafb; --accent: #6366f1; }
        .theme-pastel { --bg: #fff5f5; --card: #ffffff; --text: #4a5568; --accent: #fc8181; }
        .theme-cyber { --bg: #0f172a; --card: #1e1b4b; --text: #38bdf8; --accent: #f43f5e; }
    </style>
</head>
<body class="theme-night bg-[var(--bg)] text-[var(--text)] min-h-screen p-4 md:p-8 flex flex-col justify-between">

    <div class="max-w-6xl mx-auto w-full">
        <!-- HEADER & TOOLBAR -->
        <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight flex items-center gap-2">
                    <i data-lucide="tv"></i> DramaHub Tracker <span class="text-xs bg-indigo-600 text-white px-2 py-0.5 rounded-full">PRO</span>
                </h1>
                <p class="text-sm opacity-70 mt-1">Your ultimate binge companion</p>
            </div>
            
            <!-- Controls Toolbar (Themes + Data Backup) -->
            <div class="flex flex-wrap gap-3 justify-center items-center">
                <!-- Data Backup Utilities -->
                <div class="flex gap-2 bg-gray-800/40 p-1.5 rounded-xl border border-gray-700">
                    <button onclick="downloadBackup()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-700/60 hover:bg-gray-600 text-indigo-300 cursor-pointer transition">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> Backup
                    </button>
                    <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold bg-gray-700/60 hover:bg-gray-600 text-emerald-300 cursor-pointer transition">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i> Restore
                        <input type="file" id="upload-file" accept=".json" onchange="uploadBackup(event)" class="hidden">
                    </label>
                </div>

                <!-- Theme Changer Buttons -->
                <div class="flex gap-2 bg-gray-800/50 p-1.5 rounded-xl border border-gray-700">
                    <button onclick="setTheme('night')" class="px-3 py-1.5 rounded-lg text-xs font-semibold cursor-pointer hover:bg-gray-700 transition">ðŸŒŒ Night</button>
                    <button onclick="setTheme('pastel')" class="px-3 py-1.5 rounded-lg text-xs font-semibold cursor-pointer hover:bg-gray-700 transition">ðŸŒ¸ Pastel</button>
                    <button onclick="setTheme('cyber')" class="px-3 py-1.5 rounded-lg text-xs font-semibold cursor-pointer hover:bg-gray-700 transition">âš¡ Cyber</button>
                </div>
            </div>
        </header>

        <!-- GLOBAL STATISTICS BANNER -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-[var(--card)] p-4 rounded-2xl border border-gray-700/30 flex items-center gap-3 shadow-sm">
                <div class="p-3 bg-blue-500/10 text-blue-400 rounded-xl"><i data-lucide="clapperboard"></i></div>
                <div>
                    <p class="text-xs opacity-60 uppercase font-bold tracking-wider">Total Shows</p>
                    <h3 id="stat-total" class="text-2xl font-black">0</h3>
                </div>
            </div>
            <div class="bg-[var(--card)] p-4 rounded-2xl border border-gray-700/30 flex items-center gap-3 shadow-sm">
                <div class="p-3 bg-green-500/10 text-green-400 rounded-xl"><i data-lucide="play-circle"></i></div>
                <div>
                    <p class="text-xs opacity-60 uppercase font-bold tracking-wider">Watching</p>
                    <h3 id="stat-watching" class="text-2xl font-black">0</h3>
                </div>
            </div>
            <div class="bg-[var(--card)] p-4 rounded-2xl border border-gray-700/30 flex items-center gap-3 shadow-sm">
                <div class="p-3 bg-amber-500/10 text-amber-400 rounded-xl"><i data-lucide="award"></i></div>
                <div>
                    <p class="text-xs opacity-60 uppercase font-bold tracking-wider">10/10 Rated</p>
                    <h3 id="stat-masterpieces" class="text-2xl font-black">0</h3>
                </div>
            </div>
            <div class="bg-[var(--card)] p-4 rounded-2xl border border-gray-700/30 flex items-center gap-3 shadow-sm">
                <div class="p-3 bg-purple-500/10 text-purple-400 rounded-xl"><i data-lucide="hourglass"></i></div>
                <div>
                    <p class="text-xs opacity-60 uppercase font-bold tracking-wider">Episodes Counted</p>
                    <h3 id="stat-episodes" class="text-2xl font-black">0</h3>
                </div>
            </div>
        </section>

        <!-- ADD NEW DRAMA FORM -->
        <section class="bg-[var(--card)] p-6 rounded-2xl border border-gray-700/30 mb-8 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="plus-circle" class="text-indigo-400"></i> Track a New Series</h2>
            <form id="drama-form" onsubmit="addDrama(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="title" placeholder="Drama Title (e.g., Crash Landing on You)" required class="bg-black/20 border border-gray-700/50 p-3 rounded-xl focus:outline-none focus:border-indigo-500 text-sm w-full">
                <input type="text" id="genre" placeholder="Genre (e.g., Romance, Thriller)" required class="bg-black/20 border border-gray-700/50 p-3 rounded-xl focus:outline-none focus:border-indigo-500 text-sm w-full">
                
                <select id="status" class="bg-[var(--bg)] border border-gray-700/50 p-3 rounded-xl text-sm focus:outline-none w-full">
                    <option value="Watching">ðŸŽ¬ Currently Watching</option>
                    <option value="Plan to Watch">â³ Plan to Watch</option>
                    <option value="Completed">âœ… Completed</option>
                    <option value="Dropped">ðŸ—‘ï¸ Dropped</option>
                </select>
                
                <div class="flex gap-2">
                    <input type="number" id="current-ep" placeholder="Current Ep" min="0" value="0" class="bg-black/20 border border-gray-700/50 p-3 rounded-xl text-sm w-1/2 text-center">
                    <input type="number" id="total-ep" placeholder="Total Eps" min="1" value="16" class="bg-black/20 border border-gray-700/50 p-3 rounded-xl text-sm w-1/2 text-center">
                </div>

                <select id="rating" class="bg-[var(--bg)] border border-gray-700/50 p-3 rounded-xl text-sm focus:outline-none w-full">
                    <option value="10">â­ 10/10 Masterpiece</option>
                    <option value="9">â­ 9/10 Amazing</option>
                    <option value="8">â­ 8/10 Really Good</option>
                    <option value="7">â­ 7/10 Good</option>
                    <option value="6">â­ 6/10 Okay</option>
                    <option value="5">â­ 5/10 Bad</option>
                </select>

                <input type="url" id="img-url" placeholder="Drama Poster Image URL (Optional)" class="bg-black/20 border border-gray-700/50 p-3 rounded-xl focus:outline-none focus:border-indigo-500 text-sm w-full">

                <input type="url" id="stream-url" placeholder="Streaming URL Link (Netflix, Viki, etc.)" class="md:col-span-3 bg-black/20 border border-gray-700/50 p-3 rounded-xl focus:outline-none focus:border-indigo-500 text-sm w-full">

                <button type="submit" class="md:col-span-3 bg-indigo-600 hover:bg-indigo-500 font-bold py-3 rounded-xl transition text-white cursor-pointer shadow-lg shadow-indigo-600/20">Save to My Dashboard</button>
            </form>
        </section>

        <!-- DASHBOARD GRID DISPLAY -->
        <main class="mb-12">
            <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-4 mb-4">
                <div>
                    <h2 class="text-xl font-black flex items-center gap-2"><i data-lucide="layout-grid" class="text-emerald-400"></i> Active Monitor Watchlist</h2>
                    <p id="result-count" class="text-xs opacity-60 mt-1">Showing every saved series</p>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 w-full lg:w-auto">
                    <div class="relative">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 opacity-50"></i>
                        <input type="search" id="search-input" oninput="renderDashboard()" placeholder="Search title or genre" class="w-full sm:w-64 bg-[var(--card)] border border-gray-700/50 pl-9 pr-3 py-2.5 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <select id="status-filter" onchange="renderDashboard()" class="bg-[var(--card)] border border-gray-700/50 px-3 py-2.5 rounded-xl text-sm focus:outline-none">
                        <option value="All">All Statuses</option>
                        <option value="Watching">Watching</option>
                        <option value="Plan to Watch">Plan to Watch</option>
                        <option value="Completed">Completed</option>
                        <option value="Dropped">Dropped</option>
                    </select>
                    <select id="sort-filter" onchange="renderDashboard()" class="bg-[var(--card)] border border-gray-700/50 px-3 py-2.5 rounded-xl text-sm focus:outline-none">
                        <option value="year-oldest">Sort: Year Oldest</option>
                        <option value="year-newest">Sort: Year Newest</option>
                        <option value="status">Sort: Status</option>
                        <option value="title">Sort: Title</option>
                        <option value="rating">Sort: Rating</option>
                        <option value="progress">Sort: Progress</option>
                    </select>
                </div>
            </div>
            <div id="watchlist-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Javascript populates cards here automatically -->
            </div>
        </main>
    </div>

    <!-- FOOTER SIGNATURE -->
    <footer class="w-full text-center py-6 border-t border-gray-800/40 opacity-60 text-xs tracking-wide">
        <p class="flex items-center justify-center gap-1">

    </footer>

        // Core App Logic
        const STORAGE_KEY = 'dramaData_v4_public_list';
        let dramas = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!dramas || dramas.length === 0) {
            dramas = [...PUBLIC_SHOWCASE_DRAMAS];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dramas));
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dramas));
            renderDashboard();
        }

        function setTheme(themeName) {
            document.body.className = `theme-${themeName} bg-[var(--bg)] text-[var(--text)] min-h-screen p-4 md:p-8 flex flex-col justify-between`;
            localStorage.setItem('appTheme', themeName);
        }

        function downloadBackup() {
            if (dramas.length === 0) return alert("Your tracking dashboard is empty.");
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dramas, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "dramahub_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function uploadBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        dramas = importedData;
                        saveToStorage();
                        alert("Database restored successfully!");
                    }
                } catch (err) { alert("Error parsing system files."); }
            };
            reader.readAsText(file);
        }

        function addDrama(e) {
            e.preventDefault();
            const current = parseInt(document.getElementById('current-ep').value) || 0;
            const total = parseInt(document.getElementById('total-ep').value) || 16;
            let status = document.getElementById('status').value;
            
            if (current >= total && status !== "Dropped") status = "Completed";

            const newItem = {
                id: Date.now(),
                title: document.getElementById('title').value,
                genre: document.getElementById('genre').value,
                status: status,
                currentEp: current,
                totalEp: total,
                rating: document.getElementById('rating').value,
                imgUrl: document.getElementById('img-url').value || '',
                streamUrl: document.getElementById('stream-url').value || '',
                isEditing: false
            };
            dramas.push(newItem);
            document.getElementById('drama-form').reset();
            saveToStorage();
        }

        function adjustEpisode(id, amount) {
            const item = dramas.find(d => d.id === id);
            if (item) {
                item.currentEp = Math.max(0, Math.min(item.totalEp, item.currentEp + amount));
                if (item.currentEp === item.totalEp && item.status !== "Dropped") {
                    item.status = "Completed";
                }
                saveToStorage();
            }
        }

        function toggleEdit(id) {
            const item = dramas.find(d => d.id === id);
            if (item) {
                item.isEditing = !item.isEditing;
                renderDashboard();
            }
        }

        function saveInlineEdit(id) {
            const item = dramas.find(d => d.id === id);
            if (item) {
                item.title = document.getElementById(`edit-title-${id}`).value;
                item.genre = document.getElementById(`edit-genre-${id}`).value;
                item.status = document.getElementById(`edit-status-${id}`).value;
                item.currentEp = parseInt(document.getElementById(`edit-current-${id}`).value) || 0;
                item.totalEp = parseInt(document.getElementById(`edit-total-${id}`).value) || 16;
                item.rating = document.getElementById(`edit-rating-${id}`).value;
                item.imgUrl = document.getElementById(`edit-img-${id}`).value;
                item.streamUrl = document.getElementById(`edit-stream-${id}`).value;

                if (item.currentEp >= item.totalEp && item.status !== "Dropped") {
                    item.status = "Completed";
                }

                item.isEditing = false;
                saveToStorage();
            }
        }

        function deleteDrama(id) {
            const item = dramas.find(d => d.id === id);
            const title = item ? item.title : "this drama";
            if (!confirm(`Delete "${title}" from your watchlist?`)) return;
            dramas = dramas.filter(d => d.id !== id);
            saveToStorage();
        }

        function getProgress(item) {
            const total = Math.max(1, Number(item.totalEp) || 1);
            const current = Math.max(0, Math.min(total, Number(item.currentEp) || 0));
            return Math.round((current / total) * 100);
        }

        

        function getYear(item) {
            const match = String(item.title || '').match(/\((\d{4})\)/);
            return match ? Number(match[1]) : 9999;
        }
function normalizeUiText() {
            const themeButtons = document.querySelectorAll('button[onclick^="setTheme"]');
            if (themeButtons[0]) themeButtons[0].textContent = 'Night';
            if (themeButtons[1]) themeButtons[1].textContent = 'Pastel';
            if (themeButtons[2]) themeButtons[2].textContent = 'Cyber';

            const statusLabels = { 'Watching': 'Currently Watching', 'Plan to Watch': 'Plan to Watch', 'Completed': 'Completed', 'Dropped': 'Dropped' };
            document.querySelectorAll('#status option').forEach(option => option.textContent = statusLabels[option.value] || option.textContent);

            const ratingLabels = { '10': '10/10 Masterpiece', '9': '9/10 Amazing', '8': '8/10 Really Good', '7': '7/10 Good', '6': '6/10 Okay', '5': '5/10 Bad' };
            document.querySelectorAll('#rating option').forEach(option => option.textContent = ratingLabels[option.value] || option.textContent);
        }

        function renderDashboard() {
            const grid = document.getElementById('watchlist-grid');
            const searchText = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
            const statusFilter = document.getElementById('status-filter')?.value || 'All';
            const sortBy = document.getElementById('sort-filter')?.value || 'year-oldest';
            grid.innerHTML = '';

            const sortedDramas = [...dramas]
                .filter(item => {
                    const searchableText = `${item.title} ${item.genre} ${item.mainCharacters || ''}`.toLowerCase();
                    const matchesSearch = !searchText || searchableText.includes(searchText);
                    const matchesStatus = statusFilter === 'All' || item.status === statusFilter;
                    return matchesSearch && matchesStatus;
                })
                .sort((a, b) => {
                    const weights = { "Watching": 1, "Plan to Watch": 2, "Completed": 3, "Dropped": 4 };
                    if (sortBy === 'year-oldest') return getYear(a) - getYear(b) || a.title.localeCompare(b.title);
                    if (sortBy === 'year-newest') return getYear(b) - getYear(a) || a.title.localeCompare(b.title);
                    if (sortBy === 'title') return a.title.localeCompare(b.title);
                    if (sortBy === 'rating') return Number(b.rating) - Number(a.rating) || a.title.localeCompare(b.title);
                    if (sortBy === 'progress') return getProgress(b) - getProgress(a) || a.title.localeCompare(b.title);
                    return (weights[a.status] || 99) - (weights[b.status] || 99) || a.title.localeCompare(b.title);
                });

            document.getElementById('stat-total').innerText = dramas.length;
            document.getElementById('stat-watching').innerText = dramas.filter(d => d.status === 'Watching').length;
            document.getElementById('stat-masterpieces').innerText = dramas.filter(d => d.rating === '10').length;
            document.getElementById('stat-episodes').innerText = dramas.reduce((acc, curr) => acc + curr.currentEp, 0);

            const resultCount = document.getElementById('result-count');
            if (resultCount) {
                resultCount.innerText = sortedDramas.length === dramas.length
                    ? 'Showing every saved series'
                    : `Showing ${sortedDramas.length} of ${dramas.length} saved series`;
            }

            if(sortedDramas.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 opacity-50 text-sm">No dramas match your current search or filter.</div>`;
                lucide.createIcons();
                return;
            }

            sortedDramas.forEach(item => {
                const progress = getProgress(item);
                let badgeColor = 'bg-gray-500/20 text-gray-400 border border-gray-500/30';
                if (item.status === 'Watching') badgeColor = 'bg-blue-500/20 text-blue-400 border border-blue-500/30';
                else if (item.status === 'Completed') badgeColor = 'bg-green-500/20 text-green-400 border border-green-500/30';
                else if (item.status === 'Plan to Watch') badgeColor = 'bg-amber-500/20 text-amber-400 border border-amber-500/30';
                else if (item.status === 'Dropped') badgeColor = 'bg-rose-500/20 text-rose-400 border border-rose-500/30';

                const card = document.createElement('div');
                card.className = "bg-[var(--card)] rounded-2xl border border-gray-700/40 p-5 flex flex-col justify-between shadow-md relative group hover:border-indigo-500/40 transition";

                if (item.isEditing) {
                    card.innerHTML = `
                        <div class="space-y-3">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-indigo-400">Editing Card Details</h4>
                            <input type="text" id="edit-title-${item.id}" value="${item.title}" placeholder="Title" class="w-full bg-black/30 border border-gray-700 p-2 rounded-xl text-sm text-white">
                            <input type="text" id="edit-genre-${item.id}" value="${item.genre}" placeholder="Genres" class="w-full bg-black/30 border border-gray-700 p-2 rounded-xl text-sm text-white">
                            
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="text-[10px] opacity-60">Status</label>
                                    <select id="edit-status-${item.id}" class="w-full bg-gray-800 border border-gray-700 p-2 rounded-xl text-xs text-white">
                                        <option value="Watching" ${item.status === 'Watching' ? 'selected' : ''}>Watching</option>
                                        <option value="Plan to Watch" ${item.status === 'Plan to Watch' ? 'selected' : ''}>Plan to Watch</option>
                                        <option value="Completed" ${item.status === 'Completed' ? 'selected' : ''}>Completed</option>
                                        <option value="Dropped" ${item.status === 'Dropped' ? 'selected' : ''}>Dropped</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-[10px] opacity-60">Score Rating</label>
                                    <select id="edit-rating-${item.id}" class="w-full bg-gray-800 border border-gray-700 p-2 rounded-xl text-xs text-white">
                                        <option value="10" ${item.rating === '10' ? 'selected' : ''}>10/10</option>
                                        <option value="9" ${item.rating === '9' ? 'selected' : ''}>9/10</option>
                                        <option value="8" ${item.rating === '8' ? 'selected' : ''}>8/10</option>
                                        <option value="7" ${item.rating === '7' ? 'selected' : ''}>7/10</option>
                                        <option value="6" ${item.rating === '6' ? 'selected' : ''}>6/10</option>
                                        <option value="5" ${item.rating === '5' ? 'selected' : ''}>5/10</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="edit-current-${item.id}" value="${item.currentEp}" placeholder="Current Ep" class="w-full bg-black/30 border border-gray-700 p-2 rounded-xl text-sm text-center text-white">
                                <input type="number" id="edit-total-${item.id}" value="${item.totalEp}" placeholder="Total Eps" class="w-full bg-black/30 border border-gray-700 p-2 rounded-xl text-sm text-center text-white">
                            </div>

                            <input type="url" id="edit-img-${item.id}" value="${item.imgUrl}" placeholder="Image Poster URL" class="w-full bg-black/30 border border-gray-700 p-2 rounded-xl text-xs text-white">
                            <input type="url" id="edit-stream-${item.id}" value="${item.streamUrl}" placeholder="Streaming Link URL" class="w-full bg-black/30 border border-gray-700 p-2 rounded-xl text-xs text-white">
                            
                            <div class="flex gap-2 pt-2">
                                <button onclick="saveInlineEdit(${item.id})" class="w-1/2 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-xl text-xs font-bold text-white transition cursor-pointer">Save Changes</button>
                                <button onclick="toggleEdit(${item.id})" class="w-1/2 bg-gray-700 hover:bg-gray-600 py-2 rounded-xl text-xs font-bold text-white transition cursor-pointer">Cancel</button>
                            </div>
                        </div>
                    `;
                } else {
                    const streamBtn = item.streamUrl 
                        ? `<a href="${item.streamUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-1.5 text-xs font-semibold bg-emerald-600 hover:bg-emerald-500 text-white py-1.5 px-3 rounded-lg transition"><i data-lucide="external-link" class="w-3.5 h-3.5"></i> Stream</a>` 
                        : '';

                    const imgHeader = item.imgUrl 
                        ? `<div class="w-full h-96 bg-black/40 rounded-xl overflow-hidden mb-4 border border-gray-700/20 shadow-inner flex items-center justify-center">
                             <img src="${item.imgUrl}" alt="${item.title} poster" class="max-w-full max-h-full object-contain">
                           </div>` 
                        : `<div class="w-full h-40 bg-gray-800/40 rounded-xl mb-4 border border-dashed border-gray-700 flex flex-col items-center justify-center opacity-40"><i data-lucide="image" class="mb-1 w-5 h-5"></i><span class="text-[10px]">No Poster URL linked. Click Edit.</span></div>`;

                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start gap-2 mb-3">
                                <span class="text-xs px-2.5 py-0.5 rounded-full font-bold uppercase ${badgeColor}">${item.status}</span>
                                <div class="flex gap-1">
                                    <button onclick="toggleEdit(${item.id})" class="text-gray-500 hover:text-indigo-400 transition cursor-pointer p-1" title="Edit Card"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button>
                                    <button onclick="deleteDrama(${item.id})" class="text-gray-500 hover:text-rose-400 transition cursor-pointer p-1" title="Delete Card"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                </div>
                            </div>
                            
                            ${imgHeader}

                            <h3 class="text-lg font-bold tracking-tight text-white mb-1 line-clamp-1">${item.title}</h3>
                            <p class="text-xs opacity-60 flex items-center gap-1 mb-4"><i data-lucide="tag" class="w-3 h-3"></i> ${item.genre}</p>
                            
                            <div class="bg-black/20 p-3 rounded-xl border border-gray-700/10 mb-4">
                                <div class="flex items-center justify-between gap-3 mb-3">
                                    <span class="text-xs opacity-70 font-medium">Binge Timeline:</span>
                                    <div class="flex items-center gap-3">
                                        <button onclick="adjustEpisode(${item.id}, -1)" class="w-7 h-7 bg-gray-800 text-white rounded-lg flex items-center justify-center hover:bg-gray-700 font-bold cursor-pointer transition text-sm">-</button>
                                        <span class="font-mono font-bold text-sm text-indigo-300">${item.currentEp} / ${item.totalEp}</span>
                                        <button onclick="adjustEpisode(${item.id}, 1)" class="w-7 h-7 bg-gray-800 text-white rounded-lg flex items-center justify-center hover:bg-gray-700 font-bold cursor-pointer transition text-sm">+</button>
                                    </div>
                                </div>
                                <div class="h-2 rounded-full bg-gray-900/60 overflow-hidden">
                                    <div class="h-full rounded-full bg-indigo-500 transition-all" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center justify-between mt-2 border-t border-gray-700/20 pt-3">
                            <div class="text-amber-400 text-sm font-bold flex items-center gap-1">
                                <i data-lucide="star" class="w-4 h-4 fill-amber-400"></i> ${item.rating}/10
                            </div>
                            ${streamBtn}
                        </div>
                    `;
                }
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        const activeTheme = localStorage.getItem('appTheme') || 'night';
        setTheme(activeTheme);
        normalizeUiText();
        renderDashboard();
    </script>
</body>
</html>
